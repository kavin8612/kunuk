version: 2

updates:
  # Dipendenze Rust — crypto-core
  # Le PR di Dependabot vanno revisionate: dopo aver verificato la compatibilità,
  # aggiornare la versione bloccata esatta in Cargo.toml (doc 19 §5).
  - package-ecosystem: "cargo"
    directory: "/crypto-core"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dipendenze", "rust"]

  # Dipendenze Go — core backend
  - package-ecosystem: "gomod"
    directory: "/core"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dipendenze", "go"]

  # Dipendenze TypeScript — frontend
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dipendenze", "typescript"]

  # Versioni delle GitHub Actions (ci.yml e futuri workflow)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dipendenze", "ci"]
