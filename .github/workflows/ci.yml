name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancella run in corso sullo stesso ref quando arriva un nuovo push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Permesso minimo per tutti i job: lettura del codice sorgente
permissions:
  contents: read

jobs:

  # ── Job 0: rileva quali aree sono cambiate ──────────────────────────────────
  # Consente ai job successivi di girare solo quando i loro path sono toccati.
  changes:
    name: Rileva modifiche
    runs-on: ubuntu-24.04
    outputs:
      crypto-core: ${{ steps.filter.outputs.crypto-core }}
      core:        ${{ steps.filter.outputs.core }}
      frontend:    ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            crypto-core:
              - 'crypto-core/**'
              - '.github/workflows/ci.yml'
            core:
              - 'core/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  # ── Job 1: crypto-core (Rust) ───────────────────────────────────────────────
  # Gate bloccanti: rustfmt, clippy (SAST), test, cargo-audit.
  crypto-core:
    name: crypto-core (Rust)
    needs: changes
    if: needs.changes.outputs.crypto-core == 'true'
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: crypto-core
    steps:
      - uses: actions/checkout@v6.0.3

      # Versione Rust pinnata via ref (= channel di rust-toolchain.toml: 1.96.0).
      # Niente @stable: il ref è non-floating (doc 19 §5).
      - name: Installa toolchain Rust 1.96.0
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy

      # Cache: dipendenze del progetto + binari degli strumenti CI (~/.cargo/bin).
      # La chiave include la versione di cargo-audit per invalidarla ad ogni bump.
      - name: Cache cargo
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            crypto-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('crypto-core/Cargo.lock') }}-audit-0.22.2
          restore-keys: |
            ${{ runner.os }}-cargo-${{ hashFiles('crypto-core/Cargo.lock') }}-
            ${{ runner.os }}-cargo-

      - name: Formato (rustfmt)
        run: cargo fmt --check

      # clippy con -D warnings: qualsiasi warning blocca la CI (doc 19 §8);
      # funge anche da SAST di base (doc 08 §4).
      - name: Lint + SAST (clippy)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-features

      # cargo-audit 0.22.2 — versione bloccata (doc 19 §5).
      # Se già presente in cache (~/.cargo/bin), cargo install è un no-op.
      - name: Installa cargo-audit 0.22.2
        run: cargo install cargo-audit --version 0.22.2 --locked

      - name: Audit dipendenze (cargo-audit)
        run: cargo audit

  # ── Job 2: core backend (Go) ────────────────────────────────────────────────
  # Gate bloccanti: gofmt, golangci-lint (errcheck, gocyclo, gosec/SAST),
  # test, govulncheck.
  core:
    name: core (Go)
    needs: changes
    if: needs.changes.outputs.core == 'true'
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Installa Go 1.23
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.23'
          cache-dependency-path: core/go.sum

      - name: Formato (gofmt)
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "File non formattati:"
            echo "$out"
            exit 1
          fi

      # golangci-lint v2.12.2 (pinnato): legge core/.golangci.yml (schema v2).
      # Linter di sicurezza gosec = SAST (doc 08 §4, doc 19 §8).
      - name: Lint + SAST (golangci-lint)
        uses: golangci/golangci-lint-action@v9.2.1
        with:
          version: v2.12.2
          working-directory: core

      - name: Test
        run: go test ./...

      # repo-checkout: false → l'action NON rifà un secondo checkout (lo fa già il
      # job sopra). Il doppio checkout duplicava l'header Authorization → HTTP 400.
      - name: Audit dipendenze (govulncheck)
        uses: golang/govulncheck-action@v1.0.4
        with:
          work-dir: core
          repo-checkout: false

  # ── Job 3: frontend (TypeScript) ────────────────────────────────────────────
  # Gate bloccanti: prettier, eslint (SAST), tsc --noEmit, npm audit.
  frontend:
    name: frontend (TypeScript)
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Installa Node.js 22
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installa dipendenze (npm ci)
        run: npm ci

      - name: Formato (prettier)
        run: npm run format:check

      # eslint con no-explicit-any e no-floating-promises (doc 19 §8);
      # funge anche da SAST di base (doc 08 §4).
      - name: Lint + SAST (eslint)
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      # Fallisce su vulnerabilità moderate o superiori (doc 19 §5).
      - name: Audit dipendenze (npm audit)
        run: npm audit --audit-level=moderate

  # ── Job 4: gate di merge bloccante ──────────────────────────────────────────
  # Unico "required status check" da configurare nella branch protection di main.
  # Necessario perché i job con path-filter risultano "skipped" (non "success")
  # quando i loro path non sono toccati: GitHub non accetta "skipped" come
  # soddisfacimento di un required check, quindi questo job fa da aggregatore.
  ci-gate:
    name: Gate CI
    if: always()
    needs: [crypto-core, core, frontend]
    runs-on: ubuntu-24.04
    steps:
      - name: Verifica risultati di tutti i job
        run: |
          results=(
            "${{ needs.crypto-core.result }}"
            "${{ needs.core.result }}"
            "${{ needs.frontend.result }}"
          )
          failed=0
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "::error::Job fallito con risultato: $r"
              failed=1
            fi
          done
          if [[ $failed -eq 1 ]]; then exit 1; fi
          echo "Gate CI superato."
